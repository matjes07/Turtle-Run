<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Turtle Run</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #e0e0e0;
    font-family: sans-serif;
    user-select: none;
  }
  h1 {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    margin: 0;
    font-size: 2rem;
    z-index: 10;
  }
  canvas {
    display: block;
    background: #fff;
    position: absolute;
    top: 60px;
    bottom: 0;
    width: 100vw;
  }
  .controls {
    position: absolute;
    right: 20px;
    bottom: 20px;
    z-index: 10;
  }
  .btn {
    width: 50px;
    height: 50px;
    margin: 5px;
    background: #888;
    color: white;
    font-size: 2rem;
    line-height: 50px;
    text-align: center;
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>
<body>
  <h1>Turtle Run</h1>
  <canvas id="game"></canvas>
  <div class="controls">
    <div class="btn" id="up">▲</div>
    <div class="btn" id="down">▼</div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
}
resize();
window.addEventListener('resize', resize);

let turtle = { x: 50, y: 100, size: 40, vy: 0 };
let dino = { x: 10, y: 100, size: 40 };
let slots = [];
let speed = 2;
let level = 1;
let flying = false;

function newLevel() {
  slots = [];
  const slotCount = Math.floor(Math.random() * 5) + 5;
  for (let i = 0; i < slotCount; i++) {
    const w = 30;
    const h = Math.random() * (canvas.height/2 - 50) + 20;
    const x = canvas.width + i * (w + 150);
    const gap = 100;
    const y = Math.random() * (canvas.height - gap - h - 20) + 10;
    slots.push({ x, y, w, h });
  }
}

newLevel();

function update() {
  if (!flying) {
    turtle.y += turtle.vy;
    if (turtle.y < 20) turtle.y = 20;
    if (turtle.y > canvas.height - turtle.size - 20) turtle.y = canvas.height - turtle.size - 20;
    dino.y += (turtle.y - dino.y) * 0.02;

    slots.forEach(s => s.x -= speed);
    if (slots.length && slots[0].x + slots[0].w < 0) {
      slots.shift();
      if (slots.length === 0) {
        level++;
        flying = true;
        setTimeout(() => {
          // Schildkröte dreht sich und fliegt weg
          turtle.vy = -5;
          setTimeout(() => {
            flying = false;
            turtle.x = 50;
            turtle.y = canvas.height/2;
            turtle.vy = 0;
            newLevel();
          }, 1500);
        }, 500);
      }
    }
  } else {
    turtle.y += turtle.vy;
    turtle.x += 2;
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Boden und Decke
  ctx.fillStyle = '#444';
  ctx.fillRect(0, 0, canvas.width, 20);
  ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

  // Slots
  slots.forEach(s => {
    ctx.fillStyle = '#2a8';
    ctx.fillRect(s.x, 20 + s.y, s.w, s.h);
  });

  // Dino
  ctx.fillStyle = '#a22';
  ctx.fillRect(dino.x, dino.y, dino.size, dino.size);

  // Turtle
  ctx.save();
  ctx.translate(turtle.x + turtle.size/2, turtle.y + turtle.size/2);
  if (flying) {
    ctx.rotate(Math.PI / 2);
  }
  ctx.fillStyle = '#2a2';
  ctx.fillRect(-turtle.size/2, -turtle.size/2, turtle.size, turtle.size);
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// Steuerung
document.getElementById('up').addEventListener('mousedown', () => turtle.vy = -3);
document.getElementById('down').addEventListener('mousedown', () => turtle.vy = 3);
document.getElementById('up').addEventListener('mouseup', () => turtle.vy = 0);
document.getElementById('down').addEventListener('mouseup', () => turtle.vy = 0);
document.getElementById('up').addEventListener('mouseleave', () => turtle.vy = 0);
document.getElementById('down').addEventListener('mouseleave', () => turtle.vy = 0);

// Tastatur
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') turtle.vy = -3;
  if (e.key === 'ArrowDown') turtle.vy = 3;
});
window.addEventListener('keyup', e => {
  if (['ArrowUp','ArrowDown'].includes(e.key)) turtle.vy = 0;
});
</script>
</body>
</html>
