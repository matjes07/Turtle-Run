<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Turtle Run</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #e0e0e0;
      font-family: sans-serif;
    }
    h1 {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      font-size: 2rem;
      z-index: 10;
    }
    canvas {
      display: block;
      background: #fff;
      position: absolute;
      top: 60px;
      bottom: 0;
      width: 100vw;
    }
    .controls {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 10;
    }
    .btn {
      width: 50px;
      height: 50px;
      margin: 5px;
      background: #888;
      color: white;
      font-size: 2rem;
      text-align: center;
      line-height: 50px;
      border-radius: 5px;
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>Turtle Run</h1>
  <canvas id="game"></canvas>
  <div class="controls">
    <div class="btn" id="up">▲</div>
    <div class="btn" id="down">▼</div>
  </div>

  <script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
}
resize();
window.addEventListener("resize", resize);

// Bild-Assets
const turtleImg = new Image();
turtleImg.src = "turtle.png";
const dinoImg = new Image();
dinoImg.src = "dino.png";

let turtle = { x: 80, y: 100, size: 50, vy: 0 };
let dino = { x: 10, y: 100, size: 50 };
let blocks = [];
let speed = 2;
let level = 1;
let flying = false;

function newLevel() {
  blocks = [];
  const blockCount = Math.floor(Math.random() * 5) + 5;
  for (let i = 0; i < blockCount; i++) {
    const w = 40;
    const h = Math.random() * (canvas.height / 2 - 50) + 40;
    const x = canvas.width + i * (w + 150);
    const y = Math.random() * (canvas.height - 100 - h - 20) + 30;
    const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
    blocks.push({ x, y, w, h, color });
  }
}

newLevel();

function collides(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.size > b.x &&
    a.y < b.y + b.h &&
    a.y + a.size > b.y
  );
}

function update() {
  if (!flying) {
    turtle.y += turtle.vy;
    if (turtle.y < 20) turtle.y = 20;
    if (turtle.y > canvas.height - turtle.size - 20)
      turtle.y = canvas.height - turtle.size - 20;

    // Schildkröte bleibt an Block hängen
    blocks.forEach((block) => {
      if (collides(turtle, block)) {
        turtle.x = block.x - turtle.size; // stoppt davor
      }
    });

    dino.y += (turtle.y - dino.y) * 0.02;

    blocks.forEach((b) => (b.x -= speed));

    // Dino zerstört Blöcke
    blocks = blocks.filter((block) => !collides(dino, block));

    // Level geschafft
    if (blocks.length === 0) {
      level++;
      flying = true;
      setTimeout(() => {
        turtle.vy = -4;
        turtle.x += 2;
        setTimeout(() => {
          flying = false;
          turtle.x = 80;
          turtle.y = canvas.height / 2;
          turtle.vy = 0;
          newLevel();
        }, 1500);
      }, 500);
    }
  } else {
    turtle.y += turtle.vy;
    turtle.x += 2;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Decke und Boden
  ctx.fillStyle = "#444";
  ctx.fillRect(0, 0, canvas.width, 20);
  ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

  // Blöcke
  blocks.forEach((b) => {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
  });

  // Dino
  if (dinoImg.complete) {
    ctx.drawImage(dinoImg, dino.x, dino.y, dino.size, dino.size);
  } else {
    ctx.fillStyle = "#a00";
    ctx.fillRect(dino.x, dino.y, dino.size, dino.size);
  }

  // Turtle
  ctx.save();
  ctx.translate(turtle.x + turtle.size / 2, turtle.y + turtle.size / 2);
  if (flying) ctx.rotate(Math.PI / 2);
  if (turtleImg.complete) {
    ctx.drawImage(turtleImg, -turtle.size / 2, -turtle.size / 2, turtle.size, turtle.size);
  } else {
    ctx.fillStyle = "#0a0";
    ctx.fillRect(-turtle.size / 2, -turtle.size / 2, turtle.size, turtle.size);
  }
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// Steuerung Buttons
document.getElementById("up").onmousedown = () => (turtle.vy = -3);
document.getElementById("down").onmousedown = () => (turtle.vy = 3);
["mouseup", "mouseleave"].forEach((e) => {
  document.getElementById("up").addEventListener(e, () => (turtle.vy = 0));
  document.getElementById("down").addEventListener(e, () => (turtle.vy = 0));
});

// Tastatur
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp") turtle.vy = -3;
  if (e.key === "ArrowDown") turtle.vy = 3;
});
window.addEventListener("keyup", () => (turtle.vy = 0));
  </script>
</body>
</html>
