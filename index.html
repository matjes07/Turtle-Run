<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turtle Run 🐢</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #c2f0c2; }
    canvas { display: block; background: url('background.png') no-repeat center center; background-size: cover; }
    #controls {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 10;
    }
    .btn {
      width: 60px; height: 60px; background-color: #2a5d2a; color: white;
      font-size: 2em; text-align: center; line-height: 60px;
      border-radius: 10px; user-select: none; cursor: pointer;
    }
    #message {
      position: absolute; top: 30%; width: 100%; text-align: center;
      font-size: 3em; font-family: 'Comic Sans MS', cursive;
      color: #fff; text-shadow: 2px 2px 6px #000; display: none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="controls">
  <div class="btn" onclick="jump()">⬆️</div>
  <div class="btn" onclick="duck()">⬇️</div>
  <div class="btn" onclick="moveRight()">➡️</div>
</div>
<div id="message"></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const message = document.getElementById('message');

const turtleImg = new Image(); turtleImg.src = 'turtle.png';
const dinoImg = new Image(); dinoImg.src = 'dino.png';

let level = 1;
let gameSpeed = 4;
let gravity = 1.2;

const turtle = { x: 100, y: 300, width: 64, height: 64, vy: 0, isDucking: false, angle: 0 };
const dino = { x: 10, y: 300, width: 64, height: 64 };
let obstacles = [];
let gameOver = false;
let winAnim = false;
let winCounter = 0;

function drawTurtle() {
  ctx.save();
  ctx.translate(turtle.x + turtle.width/2, turtle.y + turtle.height/2);
  if (winAnim) turtle.angle += 0.2;
  ctx.rotate(turtle.angle);
  ctx.drawImage(turtleImg, -turtle.width/2, -turtle.height/2, turtle.width, turtle.height);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawTurtle();
  ctx.drawImage(dinoImg, dino.x, dino.y, dino.width, dino.height);
  ctx.fillStyle = "#4caf50";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.width, o.height));
}

function update() {
  if (gameOver) return;

  turtle.vy += gravity;
  turtle.y += turtle.vy;
  if (turtle.y >= 300) {
    turtle.y = 300;
    turtle.vy = 0;
  }

  if (!winAnim) {
    obstacles.forEach(o => o.x -= gameSpeed);
    obstacles = obstacles.filter(o => o.x + o.width > 0);

    for (const o of obstacles) {
      if (turtle.x < o.x + o.width && turtle.x + turtle.width > o.x &&
          turtle.y < o.y + o.height && turtle.y + turtle.height > o.y) {
        endGame(false);
        return;
      }
    }

    if (dino.x < turtle.x - 60) dino.x += 1.2;
    else endGame(false);

    if (turtle.x > canvas.width - turtle.width - 10) {
      startWinAnimation();
    }
  } else {
    turtle.y -= 4;
    if (++winCounter > 100) nextLevel();
  }

  draw();
  requestAnimationFrame(update);
}

function jump() {
  if (turtle.y >= 300) {
    turtle.vy = -18;
    turtle.isDucking = false;
    turtle.height = 64;
  }
}

function duck() {
  if (!turtle.isDucking && turtle.y >= 300) {
    turtle.height = 40;
    turtle.isDucking = true;
    setTimeout(() => {
      turtle.height = 64;
      turtle.isDucking = false;
    }, 800);
  }
}

function moveRight() {
  if (!winAnim && !gameOver) turtle.x += 10;
}

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') jump();
  if (e.key === 'ArrowDown') duck();
  if (e.key === 'ArrowRight') moveRight();
});

function spawnObstacle() {
  if (!gameOver && !winAnim) {
    const height = Math.random() > 0.5 ? 50 : 100;
    const y = 350 - height;
    obstacles.push({ x: canvas.width, y: y, width: 30, height: height });
  }
}

function startWinAnimation() {
  winAnim = true;
  turtle.vy = 0;
}

function endGame(win) {
  gameOver = true;
  message.style.display = 'block';
  message.textContent = win ? "🏆 Level geschafft!" : "💥 Gefressen!";
}

function nextLevel() {
  level++;
  gameSpeed += 1;
  dino.x = 10;
  turtle.x = 100;
  turtle.y = 300;
  turtle.angle = 0;
  winAnim = false;
  winCounter = 0;
  message.style.display = 'block';
  message.textContent = `🚀 Level ${level}`;
  setTimeout(() => {
    message.style.display = 'none';
    obstacles = [];
    gameOver = false;
    update();
  }, 2000);
}

setInterval(spawnObstacle, 1500);
update();
</script>
</body>
</html>
